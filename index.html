<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領収書読み取り → freee Excel出力</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 16px; font-weight: 500; }
  .header span { font-size: 12px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
  .api-section { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .api-section label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  .api-row input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: monospace; }
  .api-hint { font-size: 12px; color: #999; margin-top: 6px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; cursor: pointer; background: #fff; color: #666; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: transparent; }
  .drop-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 32px; text-align: center; background: #fff; }
  .drop-zone:hover, .drop-zone.dragging { border-color: #888; background: #fafafa; }
  .drop-zone input { display: none; }
  .drop-icon { font-size: 36px; margin-bottom: 10px; }
  .drop-zone p { font-size: 14px; color: #666; line-height: 1.6; }
  .drop-zone small { font-size: 12px; color: #aaa; }
  .upload-btn { display: inline-block; margin-top: 12px; padding: 10px 24px; background: #1a1a1a; color: #fff; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
  .upload-btn:hover { background: #333; }
  .preview-img { max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #eee; display: block; margin: 0 auto 12px; }
  .status { font-size: 13px; color: #666; margin: 10px 0; min-height: 22px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-wrap { background: #eee; border-radius: 4px; height: 6px; margin: 6px 0 10px; overflow: hidden; display: none; }
  .progress-bar { background: #1a1a1a; height: 6px; border-radius: 4px; transition: width 0.3s; }
  .error-box { background: #fff2f2; border: 1px solid #fcc; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #c00; margin-top: 8px; line-height: 1.6; }
  .done-box { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #2e7d32; margin-top: 8px; }
  .result-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px 20px; margin-top: 16px; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .result-header span { font-size: 15px; font-weight: 500; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; }
  .badge.warn { background: #fff8e1; color: #e65100; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-item label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .field-item input, .field-item select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; color: #1a1a1a; }
  .field-item.full { grid-column: 1 / -1; }
  .auto-hint { font-size: 12px; color: #888; margin-top: 10px; }
  .action-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .btn { padding: 8px 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 14px; cursor: pointer; color: #333; }
  .btn:hover { background: #f5f5f5; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #333; }
  .btn-danger { background: #fff; color: #c00; border-color: #fcc; }
  .btn-danger:hover { background: #fff2f2; }
  .list-header { display: grid; grid-template-columns: 88px 1fr 90px 80px 32px; gap: 8px; padding: 4px 10px; font-size: 12px; color: #999; }
  .list-row { display: grid; grid-template-columns: 88px 1fr 90px 80px 32px; gap: 8px; align-items: center; padding: 10px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 6px; font-size: 13px; background: #fff; cursor: pointer; transition: background 0.15s; }
  .list-row:hover { background: #f9f9f9; }
  .list-row.reviewing { border-color: #1a1a1a; background: #f5f5f5; }
  .list-row span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kamoku-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #e8eaf6; color: #3949ab; white-space: nowrap; }
  .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
  .export-row { display: flex; justify-content: flex-end; margin-top: 12px; }
  .date-hint { font-size: 11px; color: #aaa; margin-top: 3px; }

  /* ① レビューパネル */
  .review-panel { background: #fff; border: 2px solid #1a1a1a; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .review-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .review-panel-header span { font-size: 14px; font-weight: 600; }
  .review-nav { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; }
  .review-nav button { padding: 4px 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; }
  .review-nav button:hover { background: #f5f5f5; }
  .review-img { max-width: 100%; max-height: 180px; border-radius: 8px; border: 1px solid #eee; display: block; margin: 10px auto; }
</style>
</head>
<body>
<div class="header">
  <h1>領収書読み取り</h1>
  <span>freee Excel出力</span>
</div>
<div class="container">
  <div class="api-section">
    <label>Anthropic APIキー</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <p class="api-hint">APIキーはこの画面上にのみ保持されます。　<a href="https://console.anthropic.com/" target="_blank" style="color:#555">取得はこちら →</a></p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan')">読み取り</button>
    <button class="tab" onclick="switchTab('list')">リスト（<span id="count">0</span>件）</button>
  </div>

  <!-- 読み取りタブ -->
  <div id="tab-scan">
    <div class="drop-zone" id="dropZone" ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp,application/pdf" multiple onchange="onFiles(this.files)">
      <div id="dropContent">
        <div class="drop-icon">🧾</div>
        <p>複数枚まとめてアップロードできます</p>
        <small>JPG・PNG・PDF対応</small><br>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
      </div>
      <img id="preview" class="preview-img" style="display:none">
    </div>
    <div class="status" id="statusBar"></div>
    <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="error-box" id="errorBox" style="display:none"></div>
    <div class="done-box" id="doneBox" style="display:none"></div>

    <!-- 1枚確認フォーム -->
    <div id="resultSection" style="display:none">
      <div class="result-card">
        <div class="result-header">
          <span>読み取り結果（修正可）</span>
          <span class="badge" id="confidenceTag">読み取り完了</span>
        </div>
        <div class="field-grid">
          <div class="field-item">
            <label>発生日（C列）　※ 計上月の月末日を選択</label>
            <input type="date" id="f-date">
            <p class="date-hint">カレンダーで月末日を指定してください</p>
          </div>
          <div class="field-item">
            <label>取引先（E列）</label>
            <input type="text" id="f-store" placeholder="会社名・店名">
          </div>
          <div class="field-item">
            <label>勘定科目（G列）</label>
            <select id="f-kamoku">
              <option value="交際費">交際費（飲食代 1,001円以上）</option>
              <option value="会議費">会議費（飲食代 1,000円以下）</option>
              <option value="消耗品費">消耗品費（備品）</option>
              <option value="旅費交通費">旅費交通費（交通・ガソリン）</option>
            </select>
          </div>
          <div class="field-item">
            <label>金額・税込（I列）</label>
            <input type="text" id="f-amount" placeholder="例: 1500">
          </div>
          <div class="field-item full">
            <label>備考（L列）　形式：領収書の日付 摘要　例）2026/3/4 食材費等</label>
            <input type="text" id="f-biko" placeholder="2026/3/4 食材費等">
          </div>
        </div>
        <p class="auto-hint" id="kamokuHint"></p>
      </div>
      <div class="action-row">
        <button class="btn" onclick="resetScan()">キャンセル</button>
        <button class="btn btn-primary" onclick="addToList()">リストに追加 →</button>
      </div>
    </div>
  </div>

  <!-- リストタブ -->
  <div id="tab-list" style="display:none">

    <!-- ① レビューパネル（リストの件をクリックで展開） -->
    <div id="reviewPanel" style="display:none">
      <div class="review-panel">
        <div class="review-panel-header">
          <span>✏️ 仕訳の確認・修正</span>
          <div class="review-nav">
            <button onclick="reviewPrev()">← 前</button>
            <span id="reviewIndex">1 / 1</span>
            <button onclick="reviewNext()">次 →</button>
            <button onclick="closeReview()" style="margin-left:8px;">閉じる</button>
          </div>
        </div>
        <img id="reviewImg" class="review-img" style="display:none">
        <div class="field-grid" style="margin-top:10px;">
          <div class="field-item">
            <label>発生日（C列）</label>
            <input type="date" id="r-date">
          </div>
          <div class="field-item">
            <label>取引先（E列）</label>
            <input type="text" id="r-store">
          </div>
          <div class="field-item">
            <label>勘定科目（G列）</label>
            <select id="r-kamoku">
              <option value="交際費">交際費（飲食代 1,001円以上）</option>
              <option value="会議費">会議費（飲食代 1,000円以下）</option>
              <option value="消耗品費">消耗品費（備品）</option>
              <option value="旅費交通費">旅費交通費（交通・ガソリン）</option>
            </select>
          </div>
          <div class="field-item">
            <label>金額・税込（I列）</label>
            <input type="text" id="r-amount">
          </div>
          <div class="field-item full">
            <label>備考（L列）</label>
            <input type="text" id="r-biko">
          </div>
        </div>
        <div class="action-row">
          <button class="btn btn-danger" onclick="deleteReviewing()">削除</button>
          <button class="btn btn-primary" onclick="saveReview()">保存して次へ →</button>
        </div>
      </div>
    </div>

    <div id="listContainer"><div class="empty">まだ領収書が追加されていません</div></div>
    <div class="export-row" id="exportRow" style="display:none">
      <button class="btn btn-primary" onclick="exportExcel()">freee形式でExcelダウンロード (.xlsx)</button>
    </div>
  </div>
</div>

<script>
let records = [];
let reviewingId = null;

// ===== タブ =====
function switchTab(tab) {
  document.getElementById('tab-scan').style.display = tab === 'scan' ? '' : 'none';
  document.getElementById('tab-list').style.display = tab === 'list' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&tab==='scan')||(i===1&&tab==='list')));
  if (tab === 'list') renderList();
}

// ===== ドロップゾーン =====
function onDrag(e, over) { e.preventDefault(); document.getElementById('dropZone').classList.toggle('dragging', over); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragging');
  if (e.dataTransfer.files && e.dataTransfer.files.length > 0) onFiles(e.dataTransfer.files);
}

async function onFiles(files) {
  if (!files || files.length === 0) return;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('doneBox').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  if (files.length === 1) {
    await runSingle(files[0]);
  } else {
    await runBulk(files);
  }
}

// ===== 1枚モード =====
async function runSingle(file) {
  const preview = document.getElementById('preview');
  const dropContent = document.getElementById('dropContent');
  if (file.type.startsWith('image/')) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    dropContent.style.display = 'none';
  } else {
    preview.style.display = 'none';
    dropContent.innerHTML = '<div class="drop-icon">📄</div><p>' + file.name + '</p>';
  }
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('statusBar').innerHTML = '<div class="spinner"></div>解析中...';
  try {
    const result = await callApi(file);
    fillForm(result);
    document.getElementById('statusBar').innerHTML = '';
    document.getElementById('resultSection').style.display = '';
  } catch(e) {
    document.getElementById('statusBar').innerHTML = '';
    showError(e.message);
  }
}

// ===== 複数枚一括モード =====
async function runBulk(files) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('APIキーを入力してください。'); return; }
  document.getElementById('preview').style.display = 'none';
  document.getElementById('dropContent').style.display = '';
  document.getElementById('progressWrap').style.display = '';
  const total = files.length;
  let ok = 0, ng = 0, errs = [];
  for (let i = 0; i < total; i++) {
    const file = files[i];
    document.getElementById('statusBar').innerHTML = '<div class="spinner"></div>' + total + '枚中 ' + (i+1) + '枚目：' + file.name;
    document.getElementById('progressBar').style.width = Math.round(i / total * 100) + '%';
    try {
      const result = await callApi(file);
      // 画像のObjectURLも保持（レビュー時にプレビュー表示するため）
      const previewUrl = file.type.startsWith('image/') ? URL.createObjectURL(file) : null;
      records.push({ id: Date.now() + i, date: result.date, store: result.store, kamoku: result.kamoku, amount: result.amount, biko: result.biko, previewUrl });
      document.getElementById('count').textContent = records.length;
      ok++;
    } catch(e) {
      ng++;
      errs.push(file.name + '：' + e.message);
    }
    if (i < total - 1) await new Promise(r => setTimeout(r, 500));
  }
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('statusBar').innerHTML = '';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('fileInput').value = '';
  let msg = '✅ ' + ok + '枚の読み取りが完了！　リストタブで内容を確認・修正できます。';
  if (ng > 0) msg += '　⚠️ ' + ng + '枚でエラー：' + errs.join(' / ');
  document.getElementById('doneBox').textContent = msg;
  document.getElementById('doneBox').style.display = '';
  setTimeout(() => { switchTab('list'); openReview(records[0].id); }, 800);
}

// ===== API呼び出し =====
async function callApi(file) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('APIキーを入力してください。');
  const base64 = await fileToBase64(file);
  const isPdf = file.type === 'application/pdf';
  const contentBlock = isPdf
    ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }
    : { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } };

  const systemPrompt = `あなたは領収書から情報を抽出する専門家です。
必ず以下のJSONのみを返答してください（説明・コードブロック・前置き一切不要）:
{"date":"YYYY/MM/DD","store":"店名または会社名","amount":"税込合計を数字のみ","items":"品目の要約","confidence":"high|medium|low"}

【日付の抽出ルール】※最重要
現在は2026年です。基準年は2026年として処理してください。
1. 西暦4桁がある場合：そのまま使用
2. 和暦：令和8年→2026年、令和7年→2025年、令和6年→2024年
3. 西暦2桁のみ（例：26/3/4）→ 2026/03/04
4. 月日のみ（例：3月4日、3/4）→ 2026年と推定して 2026/03/04
5. 複数日付がある場合：「日付」「発行日」「領収日」ラベル優先
6. 読み取れない場合のみ空文字

【金額の抽出ルール】
- 「合計」「税込合計」「お買い上げ合計」「total」が最優先
- 税込金額を使用、数字のみ（カンマ・円・¥なし）

【品目の要約ルール】
- 食品・食料品・食材・飲料・お菓子・弁当 → "食材費等"
- 文房具・筆記用具・コピー用紙・備品・消耗品・電池・USB → "備品等"
- 飲食店・カフェ・居酒屋などでの飲食代 → "飲食代"
- 交通費・ガソリン → 具体的な内容（例: 電車代、ガソリン代）
- その他 → 具体的な内容を簡潔に

【confidenceの判定】
- high: 日付・金額ともに明確
- medium: どちらか一方が不明瞭
- low: 両方不明瞭または推定が多い`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: systemPrompt, messages: [{ role: 'user', content: [contentBlock, { type: 'text', text: '領収書の情報を抽出してください。日付は2026年を基準年として処理してください。' }] }] })
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || 'HTTPエラー: ' + res.status); }
  const data = await res.json();
  const text = data.content.map(b => b.text || '').join('');
  let parsed;
  try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); } catch { throw new Error('AIの応答を解析できませんでした。'); }

  // ② 日付の正規化
  let d = normalizeDate(parsed.date || '');
  if (d) { const y = parseInt(d.split('/')[0]); if (y < 2020 || y > 2030) d = '2026/' + d.split('/')[1] + '/' + d.split('/')[2]; }

  // 発生日（月末）
  let dateForC = '';
  if (d && /^\d{4}\/\d{2}\/\d{2}$/.test(d)) {
    const [y, m] = d.split('/').map(Number);
    const last = new Date(y, m, 0).getDate();
    dateForC = y + '/' + String(m).padStart(2,'0') + '/' + String(last).padStart(2,'0');
  } else {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth() + 1;
    dateForC = y + '/' + String(m).padStart(2,'0') + '/' + String(new Date(y, m, 0).getDate()).padStart(2,'0');
  }

  // ② 備考欄：「領収書の実日付 摘要」を正しく生成
  const bikoDate = d || dateForC;
  const bikoItems = parsed.items || '';
  const biko = bikoDate && bikoItems ? bikoDate + ' ' + bikoItems : bikoDate || bikoItems;

  return { date: dateForC, store: parsed.store || '', kamoku: guessKamoku(parsed.items, parsed.amount), amount: parsed.amount || '', biko, confidence: parsed.confidence || 'medium' };
}

// ===== ユーティリティ =====
function normalizeDate(str) {
  if (!str) return '';
  str = str.trim();
  if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(str)) { const [y,m,d]=str.split('/').map(Number); return y+'/'+String(m).padStart(2,'0')+'/'+String(d).padStart(2,'0'); }
  if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(str)) { const [y,m,d]=str.split('-').map(Number); return y+'/'+String(m).padStart(2,'0')+'/'+String(d).padStart(2,'0'); }
  if (/^\d{2}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(str)) { const p=str.split(/[\/\-]/).map(Number); return (2000+p[0])+'/'+String(p[1]).padStart(2,'0')+'/'+String(p[2]).padStart(2,'0'); }
  if (/^\d{1,2}\/\d{1,2}$/.test(str)) { const [m,d]=str.split('/').map(Number); return '2026/'+String(m).padStart(2,'0')+'/'+String(d).padStart(2,'0'); }
  return str;
}
function guessKamoku(items, amount) {
  const t = (items||'').toLowerCase();
  const amt = parseInt((amount||'0').replace(/[^\d]/g,''))||0;
  if (/ガソリン|交通|電車|バス|タクシー|新幹線|飛行機|suica|pasmo|ic/.test(t)) return '旅費交通費';
  if (/備品等|備品|文房具|消耗|印刷|コピー|usb|ケーブル|電池|ボールペン|ノート|用紙|トナー/.test(t)) return '消耗品費';
  if (/飲食|食事|ランチ|ディナー|カフェ|コーヒー|居酒屋|レストラン|食堂|弁当|接待|懇親|飲み会/.test(t)) return amt<=1000?'会議費':'交際費';
  return amt>0&&amt<=1000?'会議費':'交際費';
}
const HINTS = { '交際費':'飲食代（1,001円以上）として自動判定','会議費':'飲食代（1,000円以下）として自動判定','消耗品費':'備品・消耗品として自動判定','旅費交通費':'交通機関・ガソリン代として自動判定' };

function fileToBase64(file) {
  return new Promise((res, rej) => {
    if (!file.type.startsWith('image/')) {
      const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = () => rej(new Error('読み込み失敗')); r.readAsDataURL(file); return;
    }
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > 2000 || h > 2000) { const s = 2000/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let q = 0.85;
      const compress = () => { const d=canvas.toDataURL('image/jpeg',q); const b=d.split(',')[1]; if(b.length*0.75<=4.5*1024*1024||q<=0.3){res(b);}else{q-=0.1;compress();}};
      compress();
    };
    img.onerror = () => rej(new Error('画像読み込み失敗')); img.src = url;
  });
}

// ===== 1枚フォーム =====
function fillForm(result) {
  document.getElementById('f-date').value = result.date.replace(/\//g,'-');
  document.getElementById('f-store').value = result.store;
  document.getElementById('f-amount').value = result.amount;
  document.getElementById('f-biko').value = result.biko;
  document.getElementById('f-kamoku').value = result.kamoku;
  document.getElementById('kamokuHint').textContent = HINTS[result.kamoku] || '';
  const tag = document.getElementById('confidenceTag');
  tag.textContent = result.confidence === 'low' ? '要確認' : '読み取り完了';
  tag.className = result.confidence === 'low' ? 'badge warn' : 'badge';
}
function addToList() {
  const raw = document.getElementById('f-date').value;
  records.push({ id: Date.now(), date: raw.replace(/-/g,'/'), store: document.getElementById('f-store').value, kamoku: document.getElementById('f-kamoku').value, amount: document.getElementById('f-amount').value, biko: document.getElementById('f-biko').value, previewUrl: null });
  document.getElementById('count').textContent = records.length;
  resetScan(); switchTab('list');
}
function resetScan() {
  document.getElementById('f-date').value = '';
  ['f-amount','f-store','f-biko'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-kamoku').value = '交際費';
  document.getElementById('kamokuHint').textContent = '';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('doneBox').style.display = 'none';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('dropContent').style.display = '';
  document.getElementById('dropContent').innerHTML = '<div class="drop-icon">🧾</div><p>複数枚まとめてアップロードできます</p><small>JPG・PNG・PDF対応</small><br><button class="upload-btn" onclick="document.getElementById(\'fileInput\').click()">ファイルを選択</button>';
  document.getElementById('statusBar').innerHTML = '';
  document.getElementById('fileInput').value = '';
}
function showError(msg) {
  document.getElementById('errorBox').style.display = '';
  document.getElementById('errorBox').innerHTML = '<strong>エラー:</strong> ' + msg + '<br><small style="color:#e57373">・APIキーが正しいか確認してください<br>・ファイル形式: JPG・PNG・PDF のみ対応</small>';
}

// ===== ① レビュー機能 =====
function openReview(id) {
  reviewingId = id;
  const r = records.find(x => x.id === id);
  if (!r) return;
  const idx = records.indexOf(r);
  document.getElementById('reviewIndex').textContent = (idx+1) + ' / ' + records.length;
  document.getElementById('r-date').value = r.date.replace(/\//g,'-');
  document.getElementById('r-store').value = r.store;
  document.getElementById('r-kamoku').value = r.kamoku;
  document.getElementById('r-amount').value = r.amount;
  document.getElementById('r-biko').value = r.biko;
  const img = document.getElementById('reviewImg');
  if (r.previewUrl) { img.src = r.previewUrl; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('reviewPanel').style.display = '';
  renderList();
}
function closeReview() {
  reviewingId = null;
  document.getElementById('reviewPanel').style.display = 'none';
  renderList();
}
function saveReview() {
  const r = records.find(x => x.id === reviewingId);
  if (!r) return;
  r.date = document.getElementById('r-date').value.replace(/-/g,'/');
  r.store = document.getElementById('r-store').value;
  r.kamoku = document.getElementById('r-kamoku').value;
  r.amount = document.getElementById('r-amount').value;
  r.biko = document.getElementById('r-biko').value;
  // 次の件へ
  const idx = records.indexOf(r);
  if (idx < records.length - 1) {
    openReview(records[idx+1].id);
  } else {
    closeReview();
    document.getElementById('doneBox').textContent = '✅ 全件の確認が完了しました！';
    document.getElementById('doneBox').style.display = '';
  }
  renderList();
}
function deleteReviewing() {
  const idx = records.findIndex(x => x.id === reviewingId);
  records = records.filter(x => x.id !== reviewingId);
  document.getElementById('count').textContent = records.length;
  if (records.length === 0) { closeReview(); }
  else { openReview(records[Math.min(idx, records.length-1)].id); }
  renderList();
}
function reviewPrev() {
  const idx = records.findIndex(x => x.id === reviewingId);
  if (idx > 0) openReview(records[idx-1].id);
}
function reviewNext() {
  const idx = records.findIndex(x => x.id === reviewingId);
  if (idx < records.length-1) openReview(records[idx+1].id);
}

// ===== リスト =====
function removeRecord(id, e) { e.stopPropagation(); records = records.filter(r => r.id !== id); document.getElementById('count').textContent = records.length; if (reviewingId === id) closeReview(); renderList(); }
function renderList() {
  const el = document.getElementById('listContainer');
  const exportRow = document.getElementById('exportRow');
  if (records.length === 0) { el.innerHTML = '<div class="empty">まだ領収書が追加されていません</div>'; exportRow.style.display = 'none'; return; }
  exportRow.style.display = 'flex';
  el.innerHTML = '<div class="list-header"><span>発生日</span><span>取引先</span><span>勘定科目</span><span style="text-align:right">金額</span><span></span></div>' +
    records.map(r =>
      '<div class="list-row' + (r.id===reviewingId?' reviewing':'') + '" onclick="openReview('+r.id+')">' +
      '<span>'+r.date+'</span><span>'+r.store+'</span>' +
      '<span><span class="kamoku-badge">'+r.kamoku+'</span></span>' +
      '<span style="text-align:right">¥'+Number(r.amount||0).toLocaleString()+'</span>' +
      '<button class="btn" style="padding:4px 8px;font-size:12px" onclick="removeRecord('+r.id+',event)">×</button>' +
      '</div>'
    ).join('');
}

// ===== Excel出力 =====
function exportExcel() {
  const headers = ['収支区分','管理番号','発生日','決済期日','取引先','取引先コード','勘定科目','税区分','金額','税計算区分','税額','備考','品目','部門','メモタグ（複数指定可、カンマ区切り）','決済日','決済口座','決済金額'];
  const rows = records.map(r => { const row = new Array(18).fill(''); row[0]='支出'; row[2]=r.date; row[4]=r.store; row[6]=r.kamoku; row[8]=Number(r.amount)||''; row[11]=r.biko; return row; });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [{wch:8},{wch:8},{wch:12},{wch:12},{wch:20},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:30},{wch:12},{wch:12},{wch:20},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, 'freee支出取引データ_' + new Date().toISOString().slice(0,10) + '.xlsx');
}
